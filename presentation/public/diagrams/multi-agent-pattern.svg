<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #ff6600; }
      .label { font: 16px sans-serif; fill: #333; }
      .box { fill: #fff; stroke: #333; stroke-width: 2; }
      .coordinator { fill: #ff6600; stroke: #333; stroke-width: 2; }
      .arrow { stroke: #ff6600; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .message { stroke: #999; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; }
      .note { font: 12px sans-serif; fill: #666; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6600" />
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">Multi-Agent Collaboration Pattern</text>

  <!-- Coordinator -->
  <rect x="325" y="60" width="150" height="60" class="coordinator" rx="5"/>
  <text x="400" y="95" class="label" text-anchor="middle" fill="#fff">Coordinator</text>

  <!-- Specialized Agents -->
  <rect x="100" y="200" width="120" height="60" class="box" rx="5"/>
  <text x="160" y="235" class="label" text-anchor="middle">Researcher</text>

  <rect x="260" y="200" width="120" height="60" class="box" rx="5"/>
  <text x="320" y="235" class="label" text-anchor="middle">Writer</text>

  <rect x="420" y="200" width="120" height="60" class="box" rx="5"/>
  <text x="480" y="235" class="label" text-anchor="middle">Reviewer</text>

  <rect x="580" y="200" width="120" height="60" class="box" rx="5"/>
  <text x="640" y="235" class="label" text-anchor="middle">Analyst</text>

  <!-- Task Distribution Arrows -->
  <path d="M 375 120 L 160 200" class="arrow"/>
  <text x="250" y="155" class="note">Assign: Research</text>

  <path d="M 390 120 L 320 200" class="arrow"/>
  <text x="340" y="155" class="note">Assign: Write</text>

  <path d="M 410 120 L 480 200" class="arrow"/>
  <text x="450" y="155" class="note">Assign: Review</text>

  <path d="M 425 120 L 640 200" class="arrow"/>
  <text x="550" y="155" class="note">Assign: Analyze</text>

  <!-- Results Flow -->
  <rect x="325" y="350" width="150" height="60" class="coordinator" rx="5"/>
  <text x="400" y="375" class="label" text-anchor="middle" fill="#fff">Synthesis &amp;</text>
  <text x="400" y="395" class="label" text-anchor="middle" fill="#fff">Integration</text>

  <path d="M 160 260 L 375 350" class="arrow"/>
  <text x="250" y="310" class="note">Results</text>

  <path d="M 320 260 L 385 350" class="arrow"/>
  <text x="340" y="310" class="note">Results</text>

  <path d="M 480 260 L 415 350" class="arrow"/>
  <text x="450" y="310" class="note">Results</text>

  <path d="M 640 260 L 425 350" class="arrow"/>
  <text x="550" y="310" class="note">Results</text>

  <!-- Inter-Agent Communication -->
  <path d="M 220 230 L 260 230" class="message"/>
  <path d="M 380 230 L 420 230" class="message"/>
  <path d="M 540 230 L 580 230" class="message"/>

  <!-- Key Features -->
  <text x="50" y="450" class="note">• Specialized roles with distinct expertise</text>
  <text x="50" y="470" class="note">• Central coordination or peer-to-peer handoff</text>
  <text x="50" y="490" class="note">• Message passing for communication</text>

  <text x="450" y="450" class="note">• Independent execution within domain</text>
  <text x="450" y="470" class="note">• Result aggregation and synthesis</text>
  <text x="450" y="490" class="note">• Scalable by adding agents</text>
</svg>
