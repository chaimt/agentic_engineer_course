<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .title { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: 700; fill: #ff6b35; }
      .label { font-family: 'Roboto', sans-serif; font-size: 13px; fill: #ffffff; font-weight: 600; }
      .sublabel { font-family: 'Roboto', sans-serif; font-size: 11px; fill: #cccccc; }
      .box { fill: #1a1a1a; stroke: #ff6b35; stroke-width: 2; }
      .highlight-box { fill: rgba(255, 107, 53, 0.2); stroke: #ff9f1c; stroke-width: 2; }
      .arrow { fill: none; stroke: #ff9f1c; stroke-width: 2; marker-end: url(#arrowhead); }
      .feedback-arrow { fill: none; stroke: #ff6b35; stroke-width: 2; stroke-dasharray: 5,3; marker-end: url(#arrowhead-feedback); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9f1c" />
    </marker>
    <marker id="arrowhead-feedback" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b35" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="title">Reflection Pattern: Self-Improvement Loop</text>

  <!-- Step 1: Generate -->
  <rect x="50" y="60" width="150" height="60" rx="5" class="box"/>
  <text x="125" y="85" text-anchor="middle" class="label">1. Generate</text>
  <text x="125" y="105" text-anchor="middle" class="sublabel">Create initial output</text>

  <!-- Arrow to Critique -->
  <path d="M 200 90 L 250 90" class="arrow"/>

  <!-- Step 2: Critique -->
  <rect x="250" y="60" width="150" height="60" rx="5" class="highlight-box"/>
  <text x="325" y="85" text-anchor="middle" class="label">2. Critique</text>
  <text x="325" y="105" text-anchor="middle" class="sublabel">Review own work</text>

  <!-- Arrow to Refine -->
  <path d="M 325 120 L 325 160" class="arrow"/>

  <!-- Step 3: Refine -->
  <rect x="250" y="160" width="150" height="60" rx="5" class="box"/>
  <text x="325" y="185" text-anchor="middle" class="label">3. Refine</text>
  <text x="325" y="205" text-anchor="middle" class="sublabel">Improve based on critique</text>

  <!-- Decision Diamond -->
  <polygon points="325,250 375,280 325,310 275,280" fill="#1a1a1a" stroke="#ff9f1c" stroke-width="2"/>
  <text x="325" y="285" text-anchor="middle" class="sublabel">Good</text>
  <text x="325" y="300" text-anchor="middle" class="sublabel">enough?</text>

  <!-- Arrow to Decision -->
  <path d="M 325 220 L 325 250" class="arrow"/>

  <!-- Feedback Loop Arrow (No - iterate again) -->
  <path d="M 275 280 L 200 280 L 200 90" class="feedback-arrow"/>
  <text x="180" y="190" text-anchor="middle" class="sublabel" style="fill: #ff6b35;">No</text>
  <text x="180" y="205" text-anchor="middle" class="sublabel" style="fill: #ff6b35; font-size: 10px;">Iterate</text>

  <!-- Arrow to Final Output (Yes) -->
  <path d="M 375 280 L 450 280" class="arrow"/>
  <text x="410" y="270" text-anchor="middle" class="sublabel" style="fill: #ff9f1c;">Yes</text>

  <!-- Final Output -->
  <rect x="450" y="250" width="130" height="60" rx="5" class="highlight-box"/>
  <text x="515" y="275" text-anchor="middle" class="label">✓ Final Output</text>
  <text x="515" y="295" text-anchor="middle" class="sublabel">High quality result</text>

  <!-- Key Benefits Box -->
  <rect x="50" y="330" width="530" height="50" rx="5" style="fill: rgba(255, 159, 28, 0.1); stroke: #ff9f1c; stroke-width: 1;"/>
  <text x="60" y="350" class="label" style="fill: #ff9f1c;">Benefits:</text>
  <text x="60" y="365" class="sublabel">• Self-correcting behavior  • Higher quality outputs  • Reduced human review time  • Consistent standards</text>
</svg>
