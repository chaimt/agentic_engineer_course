<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #ff6600; }
      .label { font: 16px sans-serif; fill: #333; }
      .small-label { font: 14px sans-serif; fill: #333; }
      .box { fill: #fff; stroke: #333; stroke-width: 2; }
      .generate-box { fill: #e6f2ff; stroke: #333; stroke-width: 2; }
      .evaluate-box { fill: #ffe6cc; stroke: #333; stroke-width: 2; }
      .decision-box { fill: #fff3cd; stroke: #333; stroke-width: 2; }
      .success-box { fill: #d4edda; stroke: #333; stroke-width: 2; }
      .arrow { stroke: #ff6600; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .feedback-arrow { stroke: #999; stroke-width: 2; stroke-dasharray: 5,5; fill: none; marker-end: url(#feedback-head); }
      .note { font: 12px sans-serif; fill: #666; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6600" />
    </marker>
    <marker id="feedback-head" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#999" />
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">Feedback Loop Pattern</text>

  <!-- Iteration Counter -->
  <rect x="50" y="250" width="100" height="60" class="box" rx="5" style="fill: #f0f0f0;"/>
  <text x="100" y="275" class="label" text-anchor="middle">Iteration</text>
  <text x="100" y="295" class="small-label" text-anchor="middle">Counter</text>

  <!-- Step 1: Generate -->
  <rect x="300" y="80" width="200" height="70" class="generate-box" rx="5"/>
  <text x="400" y="110" class="label" text-anchor="middle">Generate Output</text>
  <text x="400" y="130" class="small-label" text-anchor="middle">Initial or Refined</text>

  <text x="400" y="65" class="note" text-anchor="middle">Input Task</text>
  <path d="M 400 65 L 400 80" class="arrow"/>

  <!-- Step 2: Evaluate -->
  <rect x="300" y="190" width="200" height="70" class="evaluate-box" rx="5"/>
  <text x="400" y="215" class="label" text-anchor="middle">Evaluate Quality</text>
  <text x="400" y="235" class="small-label" text-anchor="middle">Score against criteria</text>

  <path d="M 400 150 L 400 190" class="arrow"/>

  <!-- Step 3: Decision -->
  <polygon points="400,300 490,340 400,380 310,340" class="decision-box"/>
  <text x="400" y="335" class="small-label" text-anchor="middle">Quality</text>
  <text x="400" y="350" class="small-label" text-anchor="middle">Threshold?</text>

  <path d="M 400 260 L 400 300" class="arrow"/>

  <!-- Success Path -->
  <rect x="550" y="310" width="180" height="60" class="success-box" rx="5"/>
  <text x="640" y="335" class="label" text-anchor="middle">✅ Success</text>
  <text x="640" y="355" class="small-label" text-anchor="middle">Quality Met</text>

  <path d="M 490 340 L 550 340" class="arrow"/>
  <text x="520" y="330" class="note">Yes</text>

  <!-- Step 4: Generate Feedback -->
  <rect x="300" y="430" width="200" height="70" class="box" rx="5" style="fill: #ffeaa7;"/>
  <text x="400" y="455" class="label" text-anchor="middle">Generate Feedback</text>
  <text x="400" y="475" class="small-label" text-anchor="middle">Identify improvements</text>

  <path d="M 400 380 L 400 430" class="arrow"/>
  <text x="420" y="410" class="note">No</text>

  <!-- Feedback Loop Back -->
  <path d="M 300 465 L 220 465 L 220 115 L 300 115" class="feedback-arrow"/>
  <text x="180" y="290" class="note" transform="rotate(-90 180 290)">Incorporate feedback</text>

  <!-- Iteration Increment -->
  <path d="M 150 280 L 220 280" class="feedback-arrow"/>

  <!-- Max Iterations Path -->
  <rect x="50" y="430" width="180" height="60" class="box" rx="5" style="fill: #f8d7da;"/>
  <text x="140" y="455" class="label" text-anchor="middle">⚠️ Max Iterations</text>
  <text x="140" y="475" class="small-label" text-anchor="middle">Stop</text>

  <path d="M 310 360 L 230 455" class="arrow"/>
  <text x="260" y="410" class="note">Max reached</text>

  <!-- Score Progress Indicator -->
  <rect x="550" y="440" width="180" height="110" class="box" rx="5" style="fill: #fff;"/>
  <text x="640" y="460" class="small-label" text-anchor="middle">Quality Progression</text>

  <!-- Simple chart -->
  <line x1="570" y1="540" x2="710" y2="540" stroke="#333" stroke-width="1"/>
  <line x1="570" y1="480" x2="570" y2="540" stroke="#333" stroke-width="1"/>
  <polyline points="570,520 610,510 650,495 690,485" stroke="#ff6600" stroke-width="2" fill="none"/>
  <circle cx="690" cy="485" r="4" fill="#ff6600"/>

  <text x="575" y="475" class="note" font-size="10">1.0</text>
  <text x="575" y="535" class="note" font-size="10">0.0</text>
  <text x="565" y="553" class="note" font-size="10">Iter</text>

  <!-- Key Features -->
  <text x="50" y="580" class="note">• Iterative refinement</text>
  <text x="230" y="580" class="note">• Quality-driven convergence</text>
  <text x="450" y="580" class="note">• Automatic improvement</text>
  <text x="650" y="580" class="note">• Measurable progress</text>
</svg>
