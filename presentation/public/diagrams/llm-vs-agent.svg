<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .title { font-family: 'Roboto', sans-serif; font-size: 20px; font-weight: 700; fill: #ff6b35; }
      .subtitle { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 600; fill: #ffffff; }
      .label { font-family: 'Roboto', sans-serif; font-size: 12px; fill: #ffffff; }
      .box { fill: #1a1a1a; stroke: #ff6b35; stroke-width: 2; }
      .arrow { fill: none; stroke: #ff9f1c; stroke-width: 2; marker-end: url(#arrowhead); }
      .highlight { fill: #ff6b35; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9f1c" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">LLM vs Agent: Request Flow Comparison</text>

  <!-- LLM Side -->
  <text x="200" y="70" text-anchor="middle" class="subtitle">LLM (Stateless)</text>

  <!-- User Request -->
  <rect x="100" y="90" width="200" height="50" rx="5" class="box"/>
  <text x="200" y="120" text-anchor="middle" class="label">User: "Add a user model"</text>

  <!-- Arrow down -->
  <path d="M 200 140 L 200 170" class="arrow"/>

  <!-- LLM Processing -->
  <rect x="100" y="170" width="200" height="50" rx="5" class="box"/>
  <text x="200" y="200" text-anchor="middle" class="label">LLM: Generates suggestion</text>

  <!-- Arrow down -->
  <path d="M 200 220 L 200 250" class="arrow"/>

  <!-- Response -->
  <rect x="100" y="250" width="200" height="60" rx="5" class="box"/>
  <text x="200" y="275" text-anchor="middle" class="label">Response: Code snippet</text>
  <text x="200" y="295" text-anchor="middle" class="label" style="font-size: 10px; fill: #cccccc;">(User must copy/paste)</text>

  <!-- Agent Side -->
  <text x="600" y="70" text-anchor="middle" class="subtitle">Agent (Stateful)</text>

  <!-- User Goal -->
  <rect x="500" y="90" width="200" height="50" rx="5" class="box"/>
  <text x="600" y="120" text-anchor="middle" class="label">User: "Add a user model"</text>

  <!-- Arrow down -->
  <path d="M 600 140 L 600 170" class="arrow"/>

  <!-- Agent Planning -->
  <rect x="500" y="170" width="200" height="50" rx="5" class="box"/>
  <text x="600" y="200" text-anchor="middle" class="label">Agent: Plans multi-step workflow</text>

  <!-- Arrow down -->
  <path d="M 600 220 L 600 250" class="arrow"/>

  <!-- Tool Execution -->
  <rect x="500" y="250" width="200" height="100" rx="5" class="box"/>
  <text x="600" y="275" text-anchor="middle" class="label" style="font-weight: 600;">Executes Actions:</text>
  <text x="600" y="295" text-anchor="middle" class="label" style="font-size: 11px;">1. Creates models/user.py</text>
  <text x="600" y="310" text-anchor="middle" class="label" style="font-size: 11px;">2. Writes code</text>
  <text x="600" y="325" text-anchor="middle" class="label" style="font-size: 11px;">3. Writes tests</text>
  <text x="600" y="340" text-anchor="middle" class="label" style="font-size: 11px;">4. Runs tests ✓</text>

  <!-- Key Difference -->
  <rect x="50" y="360" width="150" height="30" rx="5" style="fill: rgba(255, 107, 53, 0.2); stroke: #ff6b35; stroke-width: 1;"/>
  <text x="125" y="380" text-anchor="middle" class="label" style="font-size: 11px; fill: #ff9f1c;">No execution</text>

  <rect x="600" y="360" width="150" height="30" rx="5" style="fill: rgba(255, 159, 28, 0.3); stroke: #ff9f1c; stroke-width: 1;"/>
  <text x="675" y="380" text-anchor="middle" class="label" style="font-size: 11px; font-weight: 600; fill: #ff9f1c;">Autonomous execution</text>

  <!-- Center divider -->
  <line x1="400" y1="60" x2="400" y2="350" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
</svg>
