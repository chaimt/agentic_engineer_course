<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <style>
      .title { font: bold 24px sans-serif; fill: #ff6600; }
      .label { font: 16px sans-serif; fill: #333; }
      .small-label { font: 14px sans-serif; fill: #333; }
      .box { fill: #fff; stroke: #333; stroke-width: 2; }
      .parent { fill: #ff6600; stroke: #333; stroke-width: 2; }
      .arrow { stroke: #ff6600; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dependency { stroke: #999; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; }
      .note { font: 12px sans-serif; fill: #666; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6600" />
    </marker>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">Hierarchical Workflow Pattern</text>

  <!-- Parent Coordinator -->
  <rect x="300" y="60" width="200" height="70" class="parent" rx="5"/>
  <text x="400" y="90" class="label" text-anchor="middle" fill="#fff">Coordinator Agent</text>
  <text x="400" y="110" class="small-label" text-anchor="middle" fill="#fff">(Parent)</text>

  <!-- Goal Input -->
  <text x="400" y="50" class="note" text-anchor="middle">Complex Goal</text>
  <path d="M 400 50 L 400 60" class="arrow"/>

  <!-- Decomposition -->
  <rect x="280" y="160" width="240" height="40" class="box" rx="5" style="fill: #ffe6cc;"/>
  <text x="400" y="185" class="small-label" text-anchor="middle">Task Decomposition</text>

  <path d="M 400 130 L 400 160" class="arrow"/>

  <!-- Child Workers -->
  <rect x="60" y="270" width="140" height="60" class="box" rx="5"/>
  <text x="130" y="295" class="label" text-anchor="middle">Frontend</text>
  <text x="130" y="315" class="small-label" text-anchor="middle">Worker</text>

  <rect x="230" y="270" width="140" height="60" class="box" rx="5"/>
  <text x="300" y="295" class="label" text-anchor="middle">Backend</text>
  <text x="300" y="315" class="small-label" text-anchor="middle">Worker</text>

  <rect x="400" y="270" width="140" height="60" class="box" rx="5"/>
  <text x="470" y="295" class="label" text-anchor="middle">Database</text>
  <text x="470" y="315" class="small-label" text-anchor="middle">Worker</text>

  <rect x="570" y="270" width="140" height="60" class="box" rx="5"/>
  <text x="640" y="295" class="label" text-anchor="middle">Testing</text>
  <text x="640" y="315" class="small-label" text-anchor="middle">Worker</text>

  <!-- Task Assignment Arrows -->
  <path d="M 330 200 L 130 270" class="arrow"/>
  <text x="210" y="230" class="note">Task 1</text>

  <path d="M 370 200 L 300 270" class="arrow"/>
  <text x="330" y="230" class="note">Task 2</text>

  <path d="M 430 200 L 470 270" class="arrow"/>
  <text x="450" y="230" class="note">Task 3</text>

  <path d="M 470 200 L 640 270" class="arrow"/>
  <text x="570" y="230" class="note">Task 4</text>

  <!-- Dependencies -->
  <path d="M 200 300 L 230 300" class="dependency"/>
  <text x="215" y="290" class="note" font-size="10">depends</text>

  <path d="M 370 300 L 400 300" class="dependency"/>
  <text x="385" y="290" class="note" font-size="10">depends</text>

  <path d="M 540 300 L 570 300" class="dependency"/>
  <text x="555" y="290" class="note" font-size="10">depends</text>

  <!-- Result Collection -->
  <rect x="280" y="400" width="240" height="40" class="box" rx="5" style="fill: #ffe6cc;"/>
  <text x="400" y="425" class="small-label" text-anchor="middle">Result Synthesis</text>

  <path d="M 130 330 L 330 400" class="arrow"/>
  <path d="M 300 330 L 370 400" class="arrow"/>
  <path d="M 470 330 L 430 400" class="arrow"/>
  <path d="M 640 330 L 470 400" class="arrow"/>

  <!-- Final Output -->
  <rect x="300" y="470" width="200" height="50" class="parent" rx="5"/>
  <text x="400" y="500" class="label" text-anchor="middle" fill="#fff">Integrated Result</text>

  <path d="M 400 440 L 400 470" class="arrow"/>

  <!-- Key Features -->
  <text x="50" y="535" class="note">• Clear parent-child hierarchy</text>
  <text x="300" y="535" class="note">• Centralized control</text>
  <text x="500" y="535" class="note">• Dependency management</text>
  <text x="650" y="535" class="note">• Result synthesis</text>
</svg>
