# Section Specification Schema
# Contract for content specifications in specs/sections/*.spec.md

type: object
required:
  - section_id
  - title
  - order
  - duration_min
  - learning_objectives
  - slides
  - assessment

properties:
  section_id:
    type: string
    pattern: '^0[1-6]-(concepts|benefits|demo|patterns|tips|qa)$'
    description: Unique section identifier matching folder name
    examples:
      - "01-concepts"
      - "02-benefits"
      - "03-demo"

  title:
    type: string
    minLength: 5
    maxLength: 80
    description: Section title displayed in slides
    examples:
      - "What are Agentic Workflows"
      - "Live Claude Code Demo"

  order:
    type: integer
    minimum: 1
    maximum: 6
    description: Position in presentation arc (1-6)

  duration_min:
    type: integer
    minimum: 5
    maximum: 20
    description: Target duration in minutes

  slide_count_range:
    type: array
    items:
      type: integer
    minItems: 2
    maxItems: 2
    description: "[min, max] number of slides in this section"
    examples:
      - [5, 7]
      - [3, 5]

  learning_objectives:
    type: array
    minItems: 2
    items:
      type: object
      required:
        - objective
        - bloom_level
        - assessment_method
      properties:
        objective:
          type: string
          pattern: '^(Define|Explain|Demonstrate|Identify|Analyze|Create|Evaluate)'
          description: "Action-oriented statement starting with verb"
          examples:
            - "Define agentic workflows and explain key differences"
            - "Identify 3+ practical use cases in their work"

        bloom_level:
          type: string
          enum: [remember, understand, apply, analyze, evaluate, create]
          description: "Bloom's taxonomy cognitive level"

        assessment_method:
          type: string
          enum: [quiz, observation, survey, exercise]
          description: "How objective will be validated"

        success_criteria:
          type: string
          description: "Measurable outcome (maps to SC-001 through SC-005)"
          examples:
            - "90% of attendees can correctly define in post-presentation assessment"
            - "80% can identify at least 3 use cases"

  slides:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - title
        - layout
        - content
      properties:
        title:
          type: string
          description: "Slide heading"

        layout:
          type: string
          enum: [cover, default, section, two-cols, image-left, image-right, end]
          description: "Slidev layout template"

        content:
          type: string
          description: "Slide body in markdown format"

        notes:
          type: string
          description: "Presenter notes (visible only in presenter mode)"

        code_examples:
          type: array
          items:
            type: string
          description: "References to code examples (e.g., '@basic-workflow-agent{1-10}{highlight:3-5}')"

        assets:
          type: array
          items:
            type: string
          description: "Asset paths (e.g., '/screenshots/demo.png')"

        transition:
          type: string
          enum: [slide, fade, none]
          default: slide
          description: "Slide transition effect"

        clicks:
          type: integer
          minimum: 0
          description: "Number of click-through animations"

  code_examples:
    type: array
    items:
      type: object
      required:
        - id
        - file_path
        - language
      properties:
        id:
          type: string
          description: "Unique identifier for referencing in slides"
          examples:
            - "basic-workflow-agent"
            - "claude-code-init"

        file_path:
          type: string
          description: "Path relative to /examples/"
          examples:
            - "basic-workflow/agent.js"
            - "claude-code-demo/init.sh"

        language:
          type: string
          enum: [js, javascript, ts, typescript, python, bash, yaml, json, markdown]
          description: "Programming language for syntax highlighting"

        line_range:
          type: array
          items:
            type: integer
          minItems: 2
          maxItems: 2
          description: "[start, end] line numbers to display"

        highlight_lines:
          type: string
          description: "Lines to highlight (e.g., '1,3,5-7' or '1|3-5|7' for progressive)"

        description:
          type: string
          description: "What this example demonstrates"

        is_live_demo:
          type: boolean
          default: false
          description: "Whether this is part of the live demo"

  demo_segments:
    type: array
    description: "Live coding demonstration scripts (Section 03 only)"
    items:
      type: object
      required:
        - id
        - title
        - order
        - duration_min
        - script
      properties:
        id:
          type: string
          examples:
            - "demo-01-basics"
            - "demo-02-hooks"

        title:
          type: string
          examples:
            - "Claude Code Basics"
            - "Interactive Hooks"

        order:
          type: integer
          minimum: 1
          maximum: 3

        duration_min:
          type: integer
          minimum: 2
          maximum: 5

        script:
          type: string
          description: "Step-by-step markdown instructions for presenter"

        code_examples:
          type: array
          items:
            type: string
          description: "IDs of code examples used in this segment"

        validation_checkpoints:
          type: array
          items:
            type: string
          description: "Expected outcomes at each step"

        backup_recording:
          type: string
          description: "Path to MP4 in /public/demos/"
          examples:
            - "/demos/01-basics-demo.mp4"

        rehearsal_status:
          type: string
          enum: [scripted, rehearsed, validated]
          default: scripted

  assessment:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - question
        - type
        - success_threshold
      properties:
        question:
          type: string
          description: "Quiz question or observation criteria"

        type:
          type: string
          enum: [multiple_choice, short_answer, observation, quiz]

        options:
          type: array
          items:
            type: string
          description: "Answer choices (for multiple_choice)"

        correct_answer:
          type: string
          description: "Correct response (for quiz types)"

        rubric:
          type: string
          description: "Evaluation criteria (for observation)"

        success_threshold:
          type: string
          description: "Target % or criteria"
          examples:
            - "90% correct"
            - "80% identify 3+ use cases"

  status:
    type: string
    enum: [draft, reviewed, approved, generated]
    default: draft
    description: "Content workflow state"

examples:
  - section_id: "01-concepts"
    title: "What are Agentic Workflows"
    order: 1
    duration_min: 8
    slide_count_range: [5, 7]
    status: draft
    learning_objectives:
      - objective: "Define agentic workflows and explain key differences from traditional development"
        bloom_level: understand
        assessment_method: quiz
        success_criteria: "90% can correctly define (SC-001)"
    slides:
      - title: "What are Agentic Workflows"
        layout: cover
        content: "# What are Agentic Workflows\n\nFrom AI autocomplete to AI development partner"
        notes: "Introduce concept, set expectations for mental model shift"
    code_examples:
      - id: "basic-workflow-agent"
        file_path: "basic-workflow/agent.js"
        language: javascript
        line_range: [1, 10]
        highlight_lines: "3,5-7"
        description: "Simple agent initialization showing tool usage"
    assessment:
      - question: "What distinguishes agentic workflows from AI autocomplete?"
        type: multiple_choice
        correct_answer: "Multi-step execution with tool usage"
        success_threshold: "90% correct"
